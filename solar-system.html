<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Solar System 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000005; overflow: hidden; font-family: 'Courier New', monospace; }

#hud { position: fixed; top: 24px; left: 28px; z-index: 10; color: rgba(180,210,255,0.45); font-size: 11px; letter-spacing: 3px; pointer-events: none; line-height: 2; }
#controls { position: fixed; bottom: 22px; left: 28px; z-index: 10; color: rgba(130,160,255,0.3); font-size: 10px; letter-spacing: 1px; pointer-events: none; line-height: 2; }

/* hover cursor hint — matches right panel palette */
#hint {
  position: fixed; padding: 6px 12px;
  background: linear-gradient(160deg, rgba(0,12,30,0.82), rgba(0,6,20,0.88));
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(0,200,180,0.18); border-top: 1px solid rgba(0,220,200,0.32);
  border-radius: 4px; color: rgba(0,210,185,0.85);
  font-size: 10px; letter-spacing: 2px;
  pointer-events: none; display: none; z-index: 20; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* ── right panel · spacecraft HUD ── */
#panel {
  position: fixed;
  top: 16px; right: -380px;
  width: 320px; max-height: calc(100vh - 32px); border-radius: 6px;
  background: linear-gradient(170deg, rgba(0,12,30,0.42) 0%, rgba(0,6,20,0.52) 100%);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border: 1px solid rgba(0,200,180,0.08);
  border-top: 1px solid rgba(0,220,200,0.18);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 0 60px rgba(0,20,40,0.15);
  z-index: 30; transition: right 0.42s cubic-bezier(0.16,1,0.3,1);
  display: flex; flex-direction: column; overflow: hidden;
}
#panel.open { right: 16px; }

/* corner notch top-left */
#panel::before {
  content: ''; position: absolute; top: -1px; left: -1px;
  width: 14px; height: 14px;
  border-top: 2px solid rgba(0,230,210,0.7);
  border-left: 2px solid rgba(0,230,210,0.7);
  border-radius: 5px 0 0 0; pointer-events: none;
}
/* scanlines */
#panel::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; border-radius: 6px;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,30,50,0.07) 3px, rgba(0,30,50,0.07) 4px);
}

/* topbar */
#panel-topbar {
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px 8px;
  border-bottom: 1px solid rgba(0,180,160,0.14);
  background: rgba(0,20,40,0.25);
}
#panel-system-id {
  font-size: 8px; letter-spacing: 3px; color: rgba(0,200,180,0.4);
  text-transform: uppercase;
}
/* blinking status dot */
#panel-system-id::before {
  content: '◉ '; color: rgba(0,255,180,0.6);
  animation: blink 2.4s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

#panel-close {
  width: 22px; height: 22px; cursor: pointer; flex-shrink: 0;
  color: rgba(0,200,180,0.45); font-size: 10px;
  line-height: 22px; text-align: center; letter-spacing: 0;
  border: 1px solid rgba(0,180,160,0.2); border-radius: 3px;
  transition: all 0.18s;
}
#panel-close:hover { color: rgba(0,255,210,0.9); border-color: rgba(0,220,195,0.6); background: rgba(0,160,140,0.12); }

#panel-body { padding: 18px 18px 22px; overflow-y: auto; flex: 1; }
#panel-body::-webkit-scrollbar { width: 2px; }
#panel-body::-webkit-scrollbar-thumb { background: rgba(0,180,160,0.2); border-radius: 1px; }

/* header */
.p-header { margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid rgba(0,180,160,0.12); }
.p-name {
  font-size: 24px; letter-spacing: 5px; font-weight: normal;
  color: rgba(210,240,255,0.92);
  text-shadow: 0 0 24px rgba(0,180,220,0.25);
}
.p-en { font-size: 9px; letter-spacing: 4px; color: rgba(0,200,180,0.4); margin-top: 4px; }
.p-tagline { font-size: 11px; color: rgba(130,190,210,0.6); margin-top: 10px; line-height: 1.75; }

/* sections */
.p-section { margin-bottom: 16px; }
.p-section-title {
  font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(0,200,180,0.5); margin-bottom: 8px;
  padding-bottom: 5px; border-bottom: 1px solid rgba(0,180,160,0.1);
  display: flex; align-items: center; gap: 7px;
}
.p-section-title::before {
  content: ''; width: 3px; height: 3px; background: rgba(0,220,195,0.7);
  border-radius: 1px; flex-shrink: 0;
}
.p-section p { font-size: 11px; color: rgba(150,205,225,0.62); line-height: 1.88; }

/* stats grid */
.p-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.p-stat {
  background: rgba(0,30,50,0.45);
  border: 1px solid rgba(0,160,145,0.16);
  border-top: 1px solid rgba(0,200,180,0.22);
  border-radius: 3px; padding: 8px 10px;
}
.p-stat-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(0,190,170,0.38); margin-bottom: 4px; }
.p-stat-value { font-size: 11px; color: rgba(180,230,255,0.82); letter-spacing: 0.5px; }

/* ── left feature panel ── */
#feature-panel {
  position: fixed;
  top: 92px; left: -340px;
  width: 260px; border-radius: 6px;
  background: linear-gradient(170deg, rgba(0,12,30,0.42) 0%, rgba(0,6,20,0.52) 100%);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border: 1px solid rgba(0,200,180,0.08);
  border-top: 1px solid rgba(0,220,200,0.18);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 0 60px rgba(0,20,40,0.15);
  z-index: 30; transition: left 0.42s cubic-bezier(0.16,1,0.3,1);
  display: flex; flex-direction: column; overflow: hidden;
  height: auto; max-height: calc(100vh - 32px);
}
#feature-panel.open { left: 16px; }

#feature-panel::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; border-radius: 6px;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,30,50,0.07) 3px, rgba(0,30,50,0.07) 4px);
}

#fp-topbar {
  flex-shrink: 0; display: flex; align-items: center;
  padding: 9px 12px 8px;
  border-bottom: 1px solid rgba(0,180,160,0.14);
  background: rgba(0,20,40,0.25);
}
#fp-system-id {
  font-size: 8px; letter-spacing: 3px; color: rgba(0,200,180,0.4);
  text-transform: uppercase;
}
#fp-system-id::before {
  content: '◉ '; color: rgba(0,255,180,0.6);
  animation: blink 2.4s step-end infinite;
}

#fp-body { padding: 14px 14px 18px; overflow-y: auto; flex: 1; }
#fp-body::-webkit-scrollbar { width: 2px; }
#fp-body::-webkit-scrollbar-thumb { background: rgba(0,180,160,0.2); border-radius: 1px; }

/* feature card */
.fp-feature { margin-bottom: 14px; }
.fp-feature-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.fp-feature-canvas {
  width: 48px; height: 48px; border-radius: 3px;
  border: 1px solid rgba(0,180,160,0.2);
  flex-shrink: 0;
}
.fp-feature-title {
  font-size: 11px; color: rgba(200,230,240,0.85); letter-spacing: 1px;
}
.fp-feature-desc {
  font-size: 10px; color: rgba(140,200,215,0.55); line-height: 1.7;
  letter-spacing: 0.3px; margin-top: 4px;
}
</style>
</head>
<body>
<div id="hud">☀ &nbsp;SOLAR SYSTEM &nbsp;·&nbsp; 3D<br><span id="fps">—</span> FPS</div>
<div id="hint"></div>
<div id="controls">拖拽旋转 &nbsp;·&nbsp; 滚轮缩放 &nbsp;·&nbsp; 点击行星查看详情 &nbsp;·&nbsp; 双击行星放大 &nbsp;·&nbsp; 双击空白返回</div>

<!-- label canvas on top -->
<canvas id="labels" style="position:fixed;top:0;left:0;pointer-events:none;z-index:5;"></canvas>

<!-- detail panel right -->
<div id="panel">
  <div id="panel-topbar">
    <span id="panel-system-id">SYS · PLANET-DB · v2.4</span>
    <div id="panel-close">✕</div>
  </div>
  <div id="panel-body"></div>
</div>

<!-- feature panel left (visible only when zoomed) -->
<div id="feature-panel">
  <div id="fp-topbar">
    <span id="fp-system-id">FEATURES · ANALYSIS</span>
  </div>
  <div id="fp-body"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderer / Scene / Camera ─────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000008, 0.0018);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 8000);
camera.position.set(0, 80, 220);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
document.body.appendChild(renderer.domElement);

// ── Two-set texture system: procedural (overview) + real high-res (zoom) ─────
const texLoader = new THREE.TextureLoader();

// Set A: procedural textures — used in overview mode, created later in texture block
// Set B: real high-res NASA / Commons textures — preloaded async, used in zoom mode
const REAL_TEX = {};
const REAL_TEX_URLS = {
  sun:     'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg/1280px-The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg',
  mercury: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Mercury_in_color_-_Prockter07_centered.jpg/1024px-Mercury_in_color_-_Prockter07_centered.jpg',
  venus:   'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Venus_globe.jpg/1024px-Venus_globe.jpg',
  earth:   'https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Blue_Marble_2002.png/1280px-Blue_Marble_2002.png',
  mars:    'https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Mars_Valles_Marineris.jpeg/1280px-Mars_Valles_Marineris.jpeg',
  jupiter: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Jupiter%2C_image_taken_by_NASA%27s_Hubble_Space_Telescope%2C_June_2019_-_Edited.jpg/1280px-Jupiter%2C_image_taken_by_NASA%27s_Hubble_Space_Telescope%2C_June_2019_-_Edited.jpg',
  saturn:  'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Saturn_during_Equinox.jpg/1280px-Saturn_during_Equinox.jpg',
  uranus:  'https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Uranus_Voyager2_color_calibrated.png/1024px-Uranus_Voyager2_color_calibrated.png',
  neptune: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Neptune_Voyager2_color_calibrated.png/1024px-Neptune_Voyager2_color_calibrated.png',
};
// Preload all real textures
Object.entries(REAL_TEX_URLS).forEach(([key, url]) => {
  texLoader.load(url, tex => { REAL_TEX[key] = tex; }, undefined, () => {});
});

const labelCanvas = document.getElementById('labels');
const lctx = labelCanvas.getContext('2d');
function resizeAll() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  labelCanvas.width = innerWidth;
  labelCanvas.height = innerHeight;
}
resizeAll();
window.addEventListener('resize', resizeAll);

// ── Texture generator (canvas-based, no external images) ─────────────────────
function makeTexture(fn, size) {
  const c = document.createElement('canvas'); c.width = c.height = size || 256;
  fn(c.getContext('2d'), c.width);
  return new THREE.CanvasTexture(c);
}

function noiseTexture(baseHex, bands) {
  return makeTexture((ctx, S) => {
    const base = new THREE.Color(baseHex);
    ctx.fillStyle = `rgb(${~~(base.r*255)},${~~(base.g*255)},${~~(base.b*255)})`;
    ctx.fillRect(0, 0, S, S);
    bands.forEach(([col, alpha, cnt]) => {
      for (let i = 0; i < cnt; i++) {
        const y = Math.random() * S, h = Math.random() * 12 + 2;
        ctx.fillStyle = `rgba(${col},${alpha})`;
        ctx.fillRect(0, y, S, h);
      }
    });
    // Noise dots
    for (let i = 0; i < 3000; i++) {
      const x = Math.random()*S, y = Math.random()*S;
      ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.06})`;
      ctx.fillRect(x, y, 1, 1);
    }
  });
}

// ── Procedural noise helpers ──────────────────────────────────────────────────
// Simple value noise interpolated for organic look
function vnoise(x, y, seed = 0) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const fade = t => t * t * (3 - 2 * t);
  const hash = (a, b) => Math.sin(a * 127.1 + b * 311.7 + seed * 74.3) * 43758.5453 % 1;
  const lerp = (a, b, t) => a + (b - a) * fade(t);
  return lerp(
    lerp(hash(ix, iy),   hash(ix+1, iy),   fx),
    lerp(hash(ix, iy+1), hash(ix+1, iy+1), fx),
    fy
  );
}
// Fractal Brownian Motion — stack octaves of vnoise
function fbm(x, y, seed, oct = 5) {
  let v = 0, amp = 0.5, freq = 1, max = 0;
  for (let i = 0; i < oct; i++) {
    v   += vnoise(x * freq, y * freq, seed + i) * amp;
    max += amp; freq *= 2.1; amp *= 0.5;
  }
  return v / max;
}

const textures = {
  // ── Sun: convection cells + sunspots + limb darkening ──────────────────────
  sun: makeTexture((ctx, S) => {
    const img = ctx.createImageData(S, S);
    const d = img.data;
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      const nx = x / S * 6, ny = y / S * 6;
      // convection cell pattern via voronoi-ish fbm
      const n1 = fbm(nx, ny, 0, 6);
      const n2 = fbm(nx + 3.1, ny + 1.7, 42, 4);
      const cell = Math.abs(Math.sin((n1 - n2) * Math.PI * 4));
      // limb darkening: distance from centre
      const dx = (x/S - 0.5) * 2, dy = (y/S - 0.5) * 2;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const limb = 1 - dist * dist * 0.6;
      // colour: white-hot core → orange → dark red edges
      const heat = (cell * 0.7 + n1 * 0.3) * limb;
      const r = Math.min(255, 180 + heat * 75);
      const g = Math.min(255, heat * heat * 180);
      const b = Math.min(60,  heat * 30);
      const i4 = (y * S + x) * 4;
      d[i4]   = r; d[i4+1] = g; d[i4+2] = b; d[i4+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    // sunspots
    for (let s = 0; s < 8; s++) {
      const sx = S * (0.2 + Math.random() * 0.6), sy = S * (0.2 + Math.random() * 0.6);
      const r  = 3 + Math.random() * 8;
      const g  = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
      g.addColorStop(0,   'rgba(20,5,0,0.9)');
      g.addColorStop(0.5, 'rgba(80,20,0,0.6)');
      g.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
    }
  }, 512),

  // ── Mercury: cratered grey rock ────────────────────────────────────────────
  mercury: makeTexture((ctx, S) => {
    const img = ctx.createImageData(S, S);
    const d = img.data;
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      const n = fbm(x/S*5, y/S*5, 10);
      const v = Math.round(90 + n * 80);
      const i4 = (y * S + x) * 4;
      d[i4] = v + 10; d[i4+1] = v; d[i4+2] = v - 8; d[i4+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    // craters
    for (let c = 0; c < 40; c++) {
      const cx = Math.random()*S, cy = Math.random()*S, r = 2 + Math.random()*14;
      const g = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,   'rgba(40,35,30,0.7)');
      g.addColorStop(0.7, 'rgba(80,75,65,0.3)');
      g.addColorStop(1,   'rgba(160,155,140,0.4)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    }
  }, 512),

  // ── Venus: thick swirling sulphur cloud bands ──────────────────────────────
  venus: makeTexture((ctx, S) => {
    const img = ctx.createImageData(S, S);
    const d = img.data;
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      const ny = y / S;
      const warp = fbm(x/S*3, ny*3, 20) * 0.3;
      const band = Math.sin((ny + warp) * Math.PI * 8) * 0.5 + 0.5;
      const n = fbm(x/S*4, ny*4, 21);
      const v = band * 0.6 + n * 0.4;
      const i4 = (y * S + x) * 4;
      d[i4]   = Math.min(255, 180 + v * 60);
      d[i4+1] = Math.min(255, 130 + v * 50);
      d[i4+2] = Math.min(255, 30  + v * 20);
      d[i4+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
  }, 512),

  // ── Earth: oceans + continents + clouds ────────────────────────────────────
  earth: makeTexture((ctx, S) => {
    const img = ctx.createImageData(S, S);
    const d = img.data;
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      const n = fbm(x/S*4, y/S*4, 30, 6);
      const pole = Math.abs(y/S - 0.5) * 2; // 0 equator, 1 pole
      const i4 = (y * S + x) * 4;
      if (n > 0.52) { // land
        const h = (n - 0.52) * 10;
        if (pole > 0.82) { d[i4]=220;d[i4+1]=235;d[i4+2]=255; } // ice caps
        else if (h < 0.2) { d[i4]=210;d[i4+1]=190;d[i4+2]=130; } // beach
        else { d[i4]=30+h*40;d[i4+1]=90+h*30;d[i4+2]=20; } // green/mountain
      } else { // ocean
        const deep = 1 - n / 0.52;
        d[i4]=10;d[i4+1]=40+deep*40;d[i4+2]=100+deep*60;
      }
      d[i4+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    // cloud layer
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      const c = fbm(x/S*5+10, y/S*5, 99, 4);
      if (c > 0.58) {
        const a = (c - 0.58) * 5 * 0.7;
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }, 512),

  // ── Mars: rusty dunes + polar ice ─────────────────────────────────────────
  mars: makeTexture((ctx, S) => {
    const img = ctx.createImageData(S, S);
    const d = img.data;
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      const n  = fbm(x/S*5, y/S*5, 40, 6);
      const n2 = fbm(x/S*12, y/S*12, 41, 3);
      const pole = Math.abs(y/S - 0.5) * 2;
      const i4 = (y * S + x) * 4;
      if (pole > 0.88) { d[i4]=230;d[i4+1]=220;d[i4+2]=210;d[i4+3]=255; continue; }
      const v = n * 0.7 + n2 * 0.3;
      d[i4]   = Math.min(255, 160 + v * 60);
      d[i4+1] = Math.min(255, 60  + v * 40);
      d[i4+2] = Math.min(255, 20  + v * 15);
      d[i4+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    // Valles Marineris hint
    ctx.strokeStyle='rgba(80,30,10,0.5)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(S*0.2,S*0.48); ctx.bezierCurveTo(S*0.4,S*0.45,S*0.6,S*0.52,S*0.8,S*0.49); ctx.stroke();
  }, 512),

  // ── Jupiter: turbulent banded atmosphere + GRS ────────────────────────────
  jupiter: makeTexture((ctx, S) => {
    const img = ctx.createImageData(S, S);
    const d = img.data;
    const bandCols = [[200,150,100],[180,120,70],[220,180,130],[160,100,60],[230,200,150],[140,80,50]];
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      const ny = y / S;
      const warp = fbm(x/S*2, ny*2, 50) * 0.08;
      const bi = Math.floor(((ny + warp) * 12) % bandCols.length);
      const [br,bg,bb] = bandCols[((bi % bandCols.length) + bandCols.length) % bandCols.length];
      const n = fbm(x/S*8, ny*8, 51, 3) * 30;
      const i4 = (y * S + x) * 4;
      d[i4]=br+n;d[i4+1]=bg+n*0.7;d[i4+2]=bb+n*0.4;d[i4+3]=255;
    }
    ctx.putImageData(img, 0, 0);
    // Great Red Spot
    const gx = S*0.35, gy = S*0.52, gr = S*0.09;
    for (let r = gr; r > 0; r -= 0.5) {
      const t = r / gr;
      ctx.strokeStyle = `rgba(${160+t*40},${40+t*20},${20},${0.15})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(gx, gy, r*1.7, r, 0, 0, Math.PI*2); ctx.stroke();
    }
    ctx.fillStyle='rgba(180,55,35,0.5)';
    ctx.beginPath(); ctx.ellipse(gx, gy, gr*1.4, gr*0.7, 0, 0, Math.PI*2); ctx.fill();
  }, 512),

  // ── Saturn: subtle pale bands ─────────────────────────────────────────────
  saturn: makeTexture((ctx, S) => {
    const img = ctx.createImageData(S, S);
    const d = img.data;
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      const ny = y / S;
      const warp = fbm(x/S*2, ny*2, 60) * 0.05;
      const band = Math.sin((ny + warp) * Math.PI * 14) * 0.5 + 0.5;
      const n = fbm(x/S*5, ny*5, 61) * 0.3;
      const v = band * 0.5 + n + 0.3;
      const i4 = (y * S + x) * 4;
      d[i4]=Math.min(255,180+v*50);d[i4+1]=Math.min(255,155+v*40);d[i4+2]=Math.min(255,90+v*20);d[i4+3]=255;
    }
    ctx.putImageData(img, 0, 0);
  }, 512),

  // ── Uranus: featureless haze with faint banding ───────────────────────────
  uranus: makeTexture((ctx, S) => {
    const img = ctx.createImageData(S, S);
    const d = img.data;
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      const n = fbm(x/S*3, y/S*3, 70, 3) * 0.15;
      const i4 = (y * S + x) * 4;
      d[i4]=110+n*40;d[i4+1]=195+n*30;d[i4+2]=200+n*20;d[i4+3]=255;
    }
    ctx.putImageData(img, 0, 0);
  }, 256),

  // ── Neptune: deep blue with faint storm wisps ─────────────────────────────
  neptune: makeTexture((ctx, S) => {
    const img = ctx.createImageData(S, S);
    const d = img.data;
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      const n  = fbm(x/S*4, y/S*4, 80, 5);
      const n2 = fbm(x/S*8, y/S*8, 81, 3);
      const i4 = (y * S + x) * 4;
      d[i4]=20+n*30;d[i4+1]=50+n*60;d[i4+2]=160+n*60;d[i4+3]=255;
      // storm wisps
      if (n2 > 0.65) { const a=(n2-0.65)*3; d[i4]+=a*80;d[i4+1]+=a*80;d[i4+2]+=a*40; }
    }
    ctx.putImageData(img, 0, 0);
  }, 512),
};

// ── Glow sprite helper ────────────────────────────────────────────────────────
// Builds a radial-gradient canvas texture: bright centre → fully transparent edge.
// Uses AdditiveBlending so overlapping glows accumulate naturally.
function makeGlowSprite(r, g, b, size) {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  grad.addColorStop(0,   `rgba(${r},${g},${b},1)`);
  grad.addColorStop(0.2, `rgba(${r},${g},${b},0.6)`);
  grad.addColorStop(0.5, `rgba(${r},${g},${b},0.12)`);
  grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 128, 128);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.setScalar(size);
  return sprite;
}

}

      const g = ctx.createLinearGradient(0,0,S,0);
      g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(0.15,'rgba(180,160,100,0.3)');
      g.addColorStop(0.35,'rgba(220,200,140,0.7)'); g.addColorStop(0.55,'rgba(160,140,90,0.5)');

      ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
    });
    const rg = new THREE.RingGeometry(p.r * 1.3, p.r * 2.6, 128);
    // UV remap so texture applies radially
    const pos = rg.attributes.position, uv = rg.attributes.uv;
    for (let i = 0; i < pos.count; i++) {
      const v = new THREE.Vector3().fromBufferAttribute(pos, i);
      const d = v.length();
      uv.setXY(i, (d - p.r*1.3)/(p.r*2.6 - p.r*1.3), 0.5);

    const rm = new THREE.MeshBasicMaterial({ map: ringTex, transparent: true, opacity: 0.85, side: THREE.DoubleSide, fog: false, depthWrite: false });

const COMETS = Array.from({ length: 3 }, (_, i) => {
  const inclination = (Math.random() - 0.5) * Math.PI * 0.6;
  const perihelion = 15 + Math.random() * 20;
  const aphelion = 160 + Math.random() * 80;
  const a = (perihelion + aphelion) / 2;
  const e = (aphelion - perihelion) / (aphelion + perihelion);

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0xccddff })
  );
  scene.add(head);

  // Tail: line of fading points
  const tailCount = 60;
  const tailPos = new Float32Array(tailCount * 3);
  const tailGeo = new THREE.BufferGeometry();
  tailGeo.setAttribute('position', new THREE.BufferAttribute(tailPos, 3));
  const tailMat = new THREE.LineBasicMaterial({ color: 0x88bbff, transparent: true, opacity: 0.5, linewidth: 1 });
  const tail = new THREE.Line(tailGeo, tailMat);
  scene.add(tail);

  return { head, tail, tailPos, tailCount, a, e, inclination, phase: Math.random() * Math.PI * 2, speed: 0.00015 + Math.random() * 0.0001, history: [] };
});

function updateComet(c, frame) {
  // Elliptical orbit: true anomaly stepping
  c.phase += c.speed * (1 / Math.max(0.3, (1 - c.e * Math.cos(c.phase)) ** 2)) * 0.5;
  const r = c.a * (1 - c.e * c.e) / (1 + c.e * Math.cos(c.phase));
  const x = r * Math.cos(c.phase);
  const z = r * Math.sin(c.phase);
  const y = Math.sin(c.inclination) * z * 0.4;

  c.head.position.set(x, y, z);

  // Trail history
  c.history.unshift(new THREE.Vector3(x, y, z));
  if (c.history.length > c.tailCount) c.history.pop();

  for (let i = 0; i < c.tailCount; i++) {
    const p = c.history[i] || c.head.position;
    c.tailPos[i*3] = p.x; c.tailPos[i*3+1] = p.y; c.tailPos[i*3+2] = p.z;
  }
  c.tail.geometry.attributes.position.needsUpdate = true;
  // Tail fades near sun
  c.tail.material.opacity = Math.min(0.6, r / 40) * 0.8;
}

function getRayHit(clientX, clientY) {
  mouse2.x = (clientX / innerWidth) * 2 - 1;

  const hits = raycaster.intersectObjects(allMeshes);
  if (!hits.length) return null;

  return planetMeshes.find(p => p.mesh === hits[0].object) || null;

function makeCloudTex(size) {
  const c = document.createElement('canvas'); c.width = c.height = size || 512;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(c.width, c.width);
  for (let y = 0; y < c.width; y++) for (let x = 0; x < c.width; x++) {
    const n = fbm(x / c.width * 6, y / c.width * 6, 99, 4);
    const a = n > 0.5 ? (n - 0.5) * 3 : 0;
    const i4 = (y * c.width + x) * 4;
    img.data[i4]=255; img.data[i4+1]=255; img.data[i4+2]=255; img.data[i4+3]=Math.min(255, a * 255);
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

      ctx.beginPath(); ctx.arc(24,24,12,0,Math.PI*2); ctx.fillStyle='#aabbcc'; ctx.fill();
      ctx.fillStyle='rgba(200,220,240,0.15)'; ctx.fillRect(0,0,w,w);
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.setLineDash([1,1]); ctx.beginPath(); ctx.arc(24,24,17,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    },
    // Venus tessera terrain
    tessera(ctx) {
      ctx.fillStyle='#994400'; ctx.fillRect(0,0,w,w);
      for(let i=0;i<12;i++){
        ctx.beginPath(); ctx.moveTo(Math.random()*w,Math.random()*w);
        ctx.lineTo(Math.random()*w,Math.random()*w);
        ctx.strokeStyle='rgba(200,150,50,0.5)'; ctx.lineWidth=1; ctx.stroke();
      }
      ctx.fillStyle='rgba(120,60,20,0.3)'; ctx.fillRect(5,22,38,6);
    },
    // Uranus faint rings
    rings_faint(ctx) {
      ctx.fillStyle='#000811'; ctx.fillRect(0,0,w,w);
      ctx.beginPath(); ctx.arc(24,28,12,0,Math.PI*2); ctx.fillStyle='#88ddee'; ctx.fill();
      ctx.beginPath(); ctx.ellipse(24,28,16,17,0,0,Math.PI*2);
      ctx.strokeStyle='rgba(140,140,130,0.4)'; ctx.lineWidth=0.7; ctx.stroke();
    },
    // Miranda chevron terrain
    miranda(ctx) {
      ctx.fillStyle='#000'; ctx.fillRect(0,0,w,w);
      ctx.beginPath(); ctx.arc(24,24,14,0,Math.PI*2); ctx.fillStyle='#99aabb'; ctx.fill();
      ctx.beginPath(); ctx.moveTo(10,22); for(let i=0;i<5;i++){ctx.lineTo(14+i*5,15-i*2);ctx.lineTo(16+i*5,22+i);}
      ctx.strokeStyle='rgba(60,50,40,0.7)'; ctx.lineWidth=1.2; ctx.stroke();
      ctx.fillStyle='rgba(40,30,20,0.4)'; ctx.beginPath(); ctx.arc(38,24,5,0,Math.PI*2); ctx.fill();
    },
  };

  if (illos[featureKey]) illos[featureKey](ctx);
  return c;
}

// Left panel reference
const featurePanel = document.getElementById('feature-panel');
const fpBody = document.getElementById('fp-body');

function openFeaturePanel(p) {
  const en = (p.en || '').toLowerCase();
  const key = (p === SUN_DATA) ? 'sun' : en;
  const features = FEATURE_DATA[key] || [];
  if (!features.length) { featurePanel.classList.remove('open'); return; }

  fpBody.innerHTML = features.map(f => `
    <div class="fp-feature">
      <div class="fp-feature-header">
        <canvas class="fp-feature-canvas" width="48" height="48"></canvas>
        <div class="fp-feature-title">${f.title}</div>
      </div>
      <div class="fp-feature-desc">${f.desc}</div>
    </div>
  `).join('');

  // Draw illustrations onto each canvas
  const canvases = fpBody.querySelectorAll('.fp-feature-canvas');
  canvases.forEach((canvas, i) => {
    const illo = drawFeatureIllo(features[i].key);
    const ctx2 = canvas.getContext('2d');
    ctx2.drawImage(illo, 0, 0);
  });

  featurePanel.classList.add('open');
}

function closeFeaturePanel() {
  featurePanel.classList.remove('open');
}

const _worldPos = new THREE.Vector3();
function zoomToPlanet(p) {
  if (zoomedPlanet === p) return;
  // Clean up previous
  surfaceAnimLayers.forEach(l => l.mesh.parent && l.mesh.parent.remove(l.mesh));
  surfaceAnimLayers.length = 0;

  zoomedPlanet = p;
  p.mesh.getWorldPosition(_worldPos);
  targetCamPos.copy(_worldPos);
  targetDist = (p.r || 6) * ZOOM_DIST_FACTOR;

  const en  = (p.en || '').toLowerCase();
  const r   = p.r || 1;
  const key = en; // matches REAL_TEX keys

  // Save original Phong material for zoomOut
  prevPhongMat = p.mesh.material;

  // Choose real texture if available, otherwise keep procedural
  const realTex  = REAL_TEX[key];
  const finalTex = realTex || prevPhongMat.map;
  const mat = new THREE.MeshBasicMaterial({ map: finalTex, fog: false });
  if (mat.map) mat.map.wrapS = mat.map.wrapT = THREE.RepeatWrapping;
  p.mesh.material = mat;

  // ── Per-planet overlay layers ────────────────────────────────────────
  if (en === 'sun' || p === SUN_DATA) {
    mat.color = new THREE.Color(1, 0.92, 0.55);
    for (let fi = 0; fi < 8; fi++) {
      const fGeo = new THREE.RingGeometry(r * (1.06 + fi * 0.12), r * (1.12 + fi * 0.12), 32, 1, Math.random() * Math.PI, Math.PI * 0.35);
      const fCol = new THREE.Color().setHSL(0.1 + Math.random() * 0.07, 1, 0.55 + Math.random() * 0.4);
      const fMat = new THREE.MeshBasicMaterial({ color: fCol, transparent: true, opacity: 0.36 - fi * 0.035, side: THREE.DoubleSide, fog: false, depthWrite: false });
      const flare = new THREE.Mesh(fGeo, fMat);
      flare.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI * 2, 0);
      p.mesh.add(flare);
      surfaceAnimLayers.push({ mesh: flare, type: 'flare', speed: 0.001 + Math.random() * 0.005, planetKey: en });
    }
  }
  else if (en === 'mercury') { /* real texture already shows craters */ }
  else if (en === 'venus') {
    const haze = new THREE.Mesh(new THREE.SphereGeometry(r * 1.03, 40, 40),
      new THREE.MeshBasicMaterial({ color: 0xddaa55, transparent: true, opacity: 0.28, fog: false, depthWrite: false }));
    p.mesh.add(haze); surfaceAnimLayers.push({ mesh: haze, type: 'rotate', speed: -0.0003, planetKey: en });
  }
  else if (en === 'earth') {
    const cloud = new THREE.Mesh(new THREE.SphereGeometry(r * 1.03, 48, 48),
      new THREE.MeshBasicMaterial({ map: dynamicCloudTex, transparent: true, opacity: 0.45, fog: false, depthWrite: false }));
    p.mesh.add(cloud); surfaceAnimLayers.push({ mesh: cloud, type: 'rotate', speed: 0.0008, planetKey: en });
  }
  else if (en === 'mars') {
    const dust = new THREE.Mesh(new THREE.SphereGeometry(r * 1.02, 36, 36),
      new THREE.MeshBasicMaterial({ color: 0xcc8855, transparent: true, opacity: 0.18, fog: false, depthWrite: false }));
    p.mesh.add(dust); surfaceAnimLayers.push({ mesh: dust, type: 'rotate', speed: 0.0008, planetKey: en });
    const ice = new THREE.Mesh(new THREE.SphereGeometry(r * 0.18, 16, 16, 0, Math.PI * 2, 0, Math.PI * 0.45),
      new THREE.MeshBasicMaterial({ color: 0xeeeedd, transparent: true, opacity: 0.55, fog: false, depthWrite: false }));
    ice.position.y = r * 1.01; p.mesh.add(ice);
    surfaceAnimLayers.push({ mesh: ice, type: 'none', speed: 0, planetKey: en });
  }
  else if (en === 'jupiter') {
    const spot = new THREE.Mesh(new THREE.PlaneGeometry(r * 0.55, r * 0.35),
      new THREE.MeshBasicMaterial({ color: 0xcc4422, transparent: true, opacity: 0.62, fog: false, depthWrite: false, side: THREE.DoubleSide }));
    spot.rotation.x = Math.PI * 0.55; spot.position.set(r * 0.35, r * 0.05, r * 0.85);
    p.mesh.add(spot); surfaceAnimLayers.push({ mesh: spot, type: 'pulse', speed: 0.05, planetKey: en });
  }
  else if (en === 'saturn') {
    const haze = new THREE.Mesh(new THREE.SphereGeometry(r * 1.02, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0xeeddcc, transparent: true, opacity: 0.15, fog: false, depthWrite: false }));
    p.mesh.add(haze); surfaceAnimLayers.push({ mesh: haze, type: 'rotate', speed: 0.0004, planetKey: en });
  }
  else if (en === 'uranus') {
    const haze = new THREE.Mesh(new THREE.SphereGeometry(r * 1.02, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0x88e8ee, transparent: true, opacity: 0.16, fog: false, depthWrite: false }));
    p.mesh.add(haze); surfaceAnimLayers.push({ mesh: haze, type: 'rotate', speed: -0.00035, planetKey: en });
  }
  else if (en === 'neptune') {
    const storm = new THREE.Mesh(new THREE.SphereGeometry(r * 1.025, 36, 36),
      new THREE.MeshBasicMaterial({ color: 0x8899cc, transparent: true, opacity: 0.2, fog: false, depthWrite: false }));
    p.mesh.add(storm); surfaceAnimLayers.push({ mesh: storm, type: 'rotate', speed: 0.0006, planetKey: en });
  }

  // Open left feature panel
  openFeaturePanel(p);
}

function zoomOut() {
  if (!zoomedPlanet) return;
  const p = zoomedPlanet;

  closeFeaturePanel();

  surfaceAnimLayers.forEach(l => l.mesh.parent && l.mesh.parent.remove(l.mesh));
  surfaceAnimLayers.length = 0;

  if (prevPhongMat) {
    p.mesh.material.dispose();
    p.mesh.material = prevPhongMat;
    prevPhongMat = null;
  }

  zoomedPlanet = null;
  targetDist = 220;
  targetCamPos.set(0, 0, 0);
}

function handleClick(e) {
  const p = getRayHit(e.clientX, e.clientY);
  if (p) openPanel(p);
}

function drawLabels() {
  lctx.clearRect(0, 0, innerWidth, innerHeight);
  if (panel.classList.contains('open')) return; // hide labels when panel open
  lctx.font = '10px Courier New';
  planetMeshes.forEach(p => {
    p.mesh.getWorldPosition(tmpV);
    tmpV.project(camera);
    if (tmpV.z > 1) return;
    const panelW = panel.classList.contains('open') ? 360 : 0;
    const sx = (tmpV.x * 0.5 + 0.5) * innerWidth;
    const sy = (-tmpV.y * 0.5 + 0.5) * innerHeight;
    if (sx > innerWidth - panelW - 20) return;
    // small dot indicator
    lctx.beginPath();
    lctx.arc(sx, sy - p.r * 14, 2, 0, Math.PI * 2);
    lctx.fillStyle = 'rgba(140,180,255,0.4)';
    lctx.fill();
    // name label
    lctx.fillStyle = 'rgba(140,180,255,0.35)';
    lctx.fillText(p.name, sx + 6, sy - p.r * 14 + 4);
  });
}

// ── Animate ───────────────────────────────────────────────────────────────────
const fpsEl = document.getElementById('fps');
let frame = 0, fpsCount = 0, lastFpsT = performance.now();

function animate(ts) {
  requestAnimationFrame(animate);
  frame++;
  fpsCount++;
  if (ts - lastFpsT >= 1000) { fpsEl.textContent = fpsCount; fpsCount = 0; lastFpsT = ts; }

  // Smooth zoom
  camDist += (targetDist - camDist) * 0.06;

  // Smooth lookAt target (follows planet when zoomed)
  if (zoomedPlanet) {
    zoomedPlanet.mesh.getWorldPosition(targetCamPos);
  }
  currentCamTarget.lerp(targetCamPos, 0.06);

  // Very slow auto-rotate when not dragging and not zoomed
  if (!drag && !zoomedPlanet) rotY += 0.0003;

  // Camera — orbits around currentCamTarget, not always origin
  camera.position.x = currentCamTarget.x + Math.sin(rotY) * Math.cos(rotX) * camDist;
  camera.position.y = currentCamTarget.y + Math.sin(rotX) * camDist;
  camera.position.z = currentCamTarget.z + Math.cos(rotY) * Math.cos(rotX) * camDist;
  camera.lookAt(currentCamTarget);

  // Sun + glow sprites (always face camera, pulse gently)
  sun.rotation.y += 0.001;
  const pulse = Math.sin(frame * 0.018) * 0.06;
  sunGlow1.scale.setScalar(14 * (1 + pulse * 0.08));
  sunGlow2.scale.setScalar(28 * (1 + pulse * 0.05));
  sunGlow3.scale.setScalar(50 * (1 + pulse * 0.03));
  sunLight.intensity = 2.4 + pulse * 0.4;

  // Planets — almost no self-glow (realistic: lit by sun only)
  planetMeshes.forEach(p => {
    p.pivot.rotation.y += p.speed * SPEED_SCALE;
    // Slower self-rotation when zoomed for detail viewing
    p.mesh.rotation.y += (zoomedPlanet === p ? 0.002 : 0.003);
    if (p.moonPivot) p.moonPivot.rotation.y += 0.018;
    if (p.glowSprite) {
      p.glowSprite.material.opacity = Math.max(0.02, 0.06 - p.orbit * 0.0003);
    }
  });


  // Surface animation layers — drive per-frame
  surfaceAnimLayers.forEach(l => {
    switch (l.type) {
      case 'rotate':
        l.mesh.rotation.y += l.speed;
        break;
      case 'pulse':
        const s = 1 + Math.sin(frame * l.speed) * 0.15;
        l.mesh.scale.setScalar(s);
        break;
      case 'flare':
        l.mesh.rotation.z += l.speed;
        l.mesh.material.opacity = 0.18 + Math.sin(frame * l.speed * 3 + l.mesh.rotation.z) * 0.1;
        break;
    }
  });

  // Comets
  COMETS.forEach(c => updateComet(c, frame));

  // Stars slow drift
  stars1.rotation.y += 0.00004;
  stars2.rotation.y -= 0.00002;

  drawLabels();
  renderer.render(scene, camera);
}

animate(0);
</script>
